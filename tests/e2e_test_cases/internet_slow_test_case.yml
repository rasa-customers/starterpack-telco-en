# The internet-slow flow calls actions_run_speed_test, which returns a RANDOM
# network speed (random.randint(10, 140)). That made these two test cases flaky:
# each asserts a different branch (speed < 100 vs >= 100), so one always failed.
#
# We make them deterministic with fixtures: each fixture pre-sets the
# `network_speed_override` slot, which actions_run_speed_test reads instead of
# rolling a random number. The override is unset in production, so the live
# assistant still measures a random speed.
fixtures:
  - speed_slow:
      - network_speed_override: 50      # < 100  -> exercises the "slow" branch
  - speed_ok:
      - network_speed_override: 120     # >= 100 -> exercises the "not an issue" branch

test_cases:
  - test_case: solving_internet_slow_issue
    fixtures:
      - speed_slow
    steps:
    - user: "Hey, my internet is very slow. What's going on?"
      assertions:
        - flow_started: "fix_internet_slow"
        - bot_uttered:
            utter_name: "utter_acknowledge_issue"
        - action_executed: "action_sleep_few_sec"
        - flow_started: "run_diagnostics"
        - bot_uttered:
            utter_name: "utter_communicate_run_diagnosticss"
        - action_executed: "actions_run_speed_test"
        - bot_uttered:
            utter_name: "utter_acknowledge_speed_test_not_good"
        - action_executed: "action_sleep_few_sec"
        - bot_uttered:
            utter_name: "utter_propose_reboot_router_solution"
        - action_executed: "action_sleep_few_sec"
        - flow_started: "reboot_router"
        - bot_uttered:
            utter_name: "utter_explain_reboot_router"
    - user: "/SetSlots(reboot_router=False)"
      assertions:
        - slot_was_set:
            - name: "reboot_router"
              value: False
        - flow_started: "flow_speak_with_human"
        - bot_uttered:
            utter_name: "utter_more_help_needed_handoff_pattern"

  - test_case: solving_internet_issue_not_slow
    fixtures:
      - speed_ok
    steps:
    - user: "Hey, my internet is very slow. What's going on?"
      assertions:
        - flow_started: "fix_internet_slow"
        - bot_uttered:
            utter_name: "utter_acknowledge_issue"
        - action_executed: "action_sleep_few_sec"
        - flow_started: "run_diagnostics"
        - bot_uttered:
            utter_name: "utter_communicate_run_diagnosticss"
        - action_executed: "actions_run_speed_test"
        - bot_uttered:
            utter_name: "utter_speed_network_not_issue"
        - action_executed: "action_sleep_few_sec"
        - bot_uttered:
            utter_name: "utter_propose_other_solutions"
        - action_executed: "action_sleep_few_sec"
        - bot_uttered:
            utter_name: "utter_ask_more_help_needed"
    - user: "/SetSlots(more_help_needed=True)"
      assertions:
        - flow_started: "flow_speak_with_human"
        - bot_uttered:
            utter_name: "utter_more_help_needed_handoff_pattern"
